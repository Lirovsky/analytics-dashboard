<!DOCTYPE html>
<html lang="pt-BR" data-page="cohort">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analytics Dashboard • Cohort</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Base do projeto (mesma estética do Leads) -->
  <link rel="stylesheet" href="css/leads.css" />
  <!-- Ajustes específicos do Cohort -->
  <link rel="stylesheet" href="css/cohort.css" />
</head>

<body>
  <header class="top-nav">
    <div class="top-nav__inner">
      <div class="top-nav__brand">Analytics</div>

      <nav class="top-nav__links">
        <a class="top-nav__link" href="metrics.html">Métricas</a>
        <a class="top-nav__link" href="stages.html">Stages</a>
        <a class="top-nav__link" href="leads.html">Leads</a>
        <a class="top-nav__link" href="leads-vendedor.html">Leads • Vendedor</a>
        <a class="top-nav__link" href="vendas.html">Vendas</a>
        <a class="top-nav__link is-active" href="cohort.html">Cohort</a>
        <a class="top-nav__link" href="lp.html">LPs</a>
        <a class="top-nav__link" href="mrr.html">MRR</a>
        <a class="top-nav__link" href="perdido.html">Perdidos</a>
        <a class="top-nav__link" href="tabela-vendas-lp.html">Planilhas</a>
      </nav>
    </div>
  </header>

  <div class="dashboard">
    <aside class="filter-panel">
      <h3 class="filter-panel__title">Filtro</h3>

      <div class="filter-panel__controls">
        <div class="filter-row filter-row--date">
          <div class="filter-group">
            <label for="entryStartDate">Entrada • Data inicial</label>
            <input type="date" id="entryStartDate" class="date-input" />
          </div>

          <div class="filter-group">
            <label for="entryEndDate">Entrada • Data final</label>
            <input type="date" id="entryEndDate" class="date-input" />
          </div>

          <div class="filter-group filter-group--shortcuts">
            <label>Atalhos</label>
            <div class="filter-shortcuts">
              <button id="presetAll" class="btn btn--ghost" type="button">2025 → Hoje</button>
              <button id="preset12m" class="btn btn--ghost" type="button">Últimos 12 meses</button>
              <button id="presetYtd" class="btn btn--ghost" type="button">Ano atual</button>
            </div>
          </div>
        </div>

        <div class="filter-row filter-row--main">
          <div class="filter-group">
            <label for="sellerSelect">Vendedor</label>
            <select id="sellerSelect" class="date-input">
              <option value="">Todos</option>
            </select>
          </div>
        </div>

        <hr class="filter-sep" />

        <div class="filter-row filter-row--actions">
          <button id="applyFilters" class="btn btn--primary" type="button">Aplicar</button>
          <button id="clearAllFilters" class="btn btn--ghost" type="button">Limpar tudo</button>
        </div>
      </div>
    </aside>

    <section class="section">
      <h2 class="section__title">Cohort</h2>

      <div class="table-block table-block--cohort">
        <div class="table-block__header">
          <span class="table-block__icon">📈</span>
          <h3>Cohort por mês</h3>

          <div class="table-block__meta">
            <span class="meta-pill">Período: <strong id="metaPeriod">–</strong></span>
            <span class="meta-pill">Entradas: <strong id="metaEntries">–</strong></span>
            <span class="meta-pill">Compras: <strong id="metaPurchases">–</strong></span>
            <span class="meta-pill">Atualizado: <strong id="metaUpdated">–</strong></span>
          </div>
        </div>

        <div class="table-wrapper">
          <table class="data-table cohort-table" id="cohortTable">
            <thead id="cohortHead"></thead>
            <tbody id="cohortBody"></tbody>
            <tfoot id="cohortFoot"></tfoot>
          </table>
        </div>
      </div>
    </section>

    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
      <p>Loading data...</p>
    </div>

    <div class="toast toast--error" id="errorToast">
      <span class="toast__icon">⚠️</span>
      <span class="toast__message" id="errorMessage">Error loading data</span>
      <button class="toast__close" id="closeToast" type="button">×</button>
    </div>
  </div>

  <script src="js/cohort.js"></script>
</body>

</html>
